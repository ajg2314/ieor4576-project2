<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Agent Data Analyst</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #a78bfa;
    }

    header span {
      font-size: 0.8rem;
      color: #6b7280;
      background: #1e2130;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left: Question + Results */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      color: #e8eaf0;
      font-size: 0.95rem;
      padding: 0.85rem 1rem;
      resize: none;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #4b5563; }

    button#analyzeBtn {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0 1.5rem;
      height: 48px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button#analyzeBtn:hover { background: #6d28d9; }
    button#analyzeBtn:disabled { background: #374151; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      color: #6b7280;
      display: none;
    }
    .status.visible { display: block; }

    /* Result sections */
    .result-section {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
    }
    .result-section.visible { display: flex; }

    .card {
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 0.75rem;
    }

    .hypothesis-text {
      font-size: 1.1rem;
      font-weight: 500;
      line-height: 1.6;
      color: #f3f4f6;
    }

    .confidence-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .confidence-high { background: #064e3b; color: #6ee7b7; }
    .confidence-medium { background: #422006; color: #fbbf24; }
    .confidence-low { background: #450a0a; color: #fca5a5; }

    .evidence-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .evidence-item {
      background: #141621;
      border-left: 3px solid #7c3aed;
      padding: 0.65rem 0.9rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.875rem;
    }
    .evidence-item .claim { color: #9ca3af; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .evidence-item .data-point { color: #e8eaf0; font-weight: 500; }
    .evidence-item .source { color: #6b7280; font-size: 0.75rem; margin-top: 0.2rem; }

    .narrative-text {
      font-size: 0.9rem;
      line-height: 1.75;
      color: #d1d5db;
      white-space: pre-wrap;
    }

    /* Right: Artifacts panel */
    .artifacts-panel {
      width: 300px;
      border-left: 1px solid #2a2d3a;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .artifacts-panel h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .artifact-item {
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
    }
    .artifact-item img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .artifact-item img:hover { opacity: 0.85; }
    .artifact-item .artifact-name {
      font-size: 0.75rem;
      color: #9ca3af;
      padding: 0.5rem 0.75rem;
    }
    .artifact-item a {
      display: block;
      color: #a78bfa;
      font-size: 0.8rem;
      padding: 0.65rem 0.75rem;
      text-decoration: none;
    }
    .artifact-item a:hover { text-decoration: underline; }

    .empty-artifacts {
      color: #4b5563;
      font-size: 0.85rem;
      font-style: italic;
    }

    .error-text {
      color: #f87171;
      font-size: 0.875rem;
      background: #450a0a;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      display: none;
    }
    .error-text.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Multi-Agent Data Analyst</h1>
    <span>Collect → Explore → Hypothesize</span>
  </header>

  <div class="layout">
    <div class="main-panel">
      <div class="input-row">
        <textarea id="question" placeholder="Ask an analytics question... e.g. 'How has US inflation trended over the last 5 years and what might be driving it?'" rows="3"></textarea>
        <button id="analyzeBtn" onclick="analyze()">Analyze</button>
      </div>

      <div class="status" id="status">Running multi-agent pipeline... (Collect → EDA → Hypothesize)</div>
      <div class="error-text" id="errorBox"></div>

      <div class="result-section" id="results">
        <div class="card">
          <h2>Hypothesis</h2>
          <div class="hypothesis-text" id="hypothesisText"></div>
          <div class="confidence-badge" id="confidenceBadge"></div>
        </div>

        <div class="card">
          <h2>Evidence</h2>
          <div class="evidence-list" id="evidenceList"></div>
        </div>

        <div class="card">
          <h2>Full Analysis</h2>
          <div class="narrative-text" id="narrativeText"></div>
        </div>
      </div>
    </div>

    <div class="artifacts-panel">
      <h2>Artifacts</h2>
      <div id="artifactsList">
        <div class="empty-artifacts">Charts and reports will appear here after analysis.</div>
      </div>
    </div>
  </div>

  <script>
    async function analyze() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const btn = document.getElementById('analyzeBtn');
      const status = document.getElementById('status');
      const errorBox = document.getElementById('errorBox');
      const results = document.getElementById('results');

      btn.disabled = true;
      status.className = 'status visible';
      errorBox.className = 'error-text';
      results.className = 'result-section';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          let msg = 'Analysis failed';
          try { msg = (await res.json()).detail || msg; } catch { msg = await res.text(); }
          throw new Error(msg);
        }

        const data = await res.json();

        // Hypothesis
        document.getElementById('hypothesisText').textContent = data.hypothesis;
        const badge = document.getElementById('confidenceBadge');
        badge.textContent = `Confidence: ${data.confidence}`;
        badge.className = `confidence-badge confidence-${data.confidence}`;

        // Evidence
        const evidenceList = document.getElementById('evidenceList');
        evidenceList.innerHTML = '';
        for (const e of data.evidence) {
          const div = document.createElement('div');
          div.className = 'evidence-item';
          div.innerHTML = `
            <div class="claim">${e.claim}</div>
            <div class="data-point">${e.data_point}</div>
            <div class="source">Source: ${e.source}</div>
          `;
          evidenceList.appendChild(div);
        }

        // Narrative
        document.getElementById('narrativeText').textContent = data.narrative;

        results.className = 'result-section visible';

        // Refresh artifacts panel
        await loadArtifacts();

      } catch (err) {
        errorBox.textContent = `Error: ${err.message}`;
        errorBox.className = 'error-text visible';
      } finally {
        btn.disabled = false;
        status.className = 'status';
      }
    }

    async function loadArtifacts() {
      try {
        const res = await fetch('/artifacts/list');
        const data = await res.json();
        const container = document.getElementById('artifactsList');
        container.innerHTML = '';

        if (data.artifacts.length === 0) {
          container.innerHTML = '<div class="empty-artifacts">No artifacts yet.</div>';
          return;
        }

        for (const artifact of data.artifacts) {
          const div = document.createElement('div');
          div.className = 'artifact-item';
          if (artifact.name.endsWith('.png')) {
            div.innerHTML = `
              <img src="${artifact.url}" alt="${artifact.name}" onclick="window.open('${artifact.url}', '_blank')" />
              <div class="artifact-name">${artifact.name}</div>
            `;
          } else {
            div.innerHTML = `<a href="${artifact.url}" target="_blank">${artifact.name}</a>`;
          }
          container.appendChild(div);
        }
      } catch (e) {
        // Artifacts panel is non-critical; fail silently
      }
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('question').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze();
    });

    // Load artifacts on page load (for refreshes)
    loadArtifacts();
  </script>
</body>
</html>
